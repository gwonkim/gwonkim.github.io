<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/pages.css">
    <title>slice()와 splice()</title>
    <style>
        b {
            text-decoration: underline;
            background: rgb(27, 27, 27);
            margin: 5px;
            padding: 5px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="index2">
        <h1>slice() VS splice()</h1>
        <hr />
        <ul>
            <li>
                slice()<br />
                배열을 <b>얕은 복사</b>해서 새로운 배열로 반환
            </li>
        </ul>
        <ul>
            <li>
                splice()<br />
                배열의 기존 요소를 추가, 변경, 삭제<br />
                원본 요소 변경<b>(깊은 복사)</b>
            </li>
        </ul>
    </div>
</body>
</html>
