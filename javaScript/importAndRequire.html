<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>import VS require</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/pages.css">
    <link rel="stylesheet" type="text/css" href="/css/box.css">
</head>

<body>
    <div class="index2">
        <h1>import VS require</h1>
        <hr />
        <div class="box">
            import<br />
            : 사용하지 않은 코드는 웹팩의 tree shaking으로 인해 빌드 시 제거됨<br />
            : 코드량 감소, 성능 향상
        </div>
        <div class="box">
            require<br />
            : 모든 모듈 동적으로 불러오기 가능<br />
            : 불필요한 코드까지 불러옴.
        </div>

        <h3>결론 : import로 모듈 사용을 권장함.</h3>
    </div>

</body>

</html>
