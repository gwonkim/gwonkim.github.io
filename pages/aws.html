<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>AWS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/pages.css">
</head>

<body>
    <div class="index2">
        <h1>AWS : 우분투</h1>
        <p>
            우분투 접속 후 프로젝트 실행(WEB-front)<br />
            *주의: 프로젝트가 설치되어 있는 경우에 해당, 배포판 수정 및 업데이트
        </p>
        <p>
            1. 터미널 or cmd에서 ssh -i 접속<br />
            2. 파일이 있는 곳까지 이동 (명령어 cd oooo)<br />
            3. npm run build(web의 경우 반드시 해야 함)<br />
            4. sudo npx pm2 start npm -- start(pm2를 통해서 npm start)<br />
            5. sudo npx pm2 monit(모니터, 실행 중 에러 확인 가능)<br />
        </p>
        <hr />
    </div>
</body>

</html>
